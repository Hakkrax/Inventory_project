<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f7fafc;
            margin: 0;
            padding: 0;
        }
        body {
            padding: 0;
            color: #24324d;
        }
        .main-container {
            max-width: 430px;
            margin: 36px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 32px #0001;
            padding: 36px 32px 28px 32px;
            border: 1px solid #e5e9f2;
        }
        h2, h3 {
            margin-top: 0;
            margin-bottom: .6em;
            color: #1c3666;
            letter-spacing: .5px;
            font-weight: 600;
        }
        h3 {
            color: #2e557a;
            margin-top: 28px;
            margin-bottom: .5em;
            font-size: 1.04em;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-title {
            font-weight:500;
            margin-bottom: .25em;
        }
        input, select {
            margin: 6px 0 0 0;
            padding: 10px 12px;
            width: 98%;
            max-width: 355px;
            border-radius: 7px;
            border: 1px solid #ccd8e2;
            background: #fafbfc;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color .18s;
        }
        input:focus, select:focus {
            border-color: #75bbf7;
            outline: none;
        }
        button {
            padding: 10px 21px;
            background: linear-gradient(85deg, #206dce 70%, #47b4e4 110%);
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            margin: 7px 0 0 0;
            box-shadow: 0 2px 8px #1b92cd20;
            font-size: 1em;
            transition: background 0.18s;
        }
        button:hover {
            background: linear-gradient(85deg, #1658a0 70%, #2897be 110%);
        }
        .status-area,
        .result-area,
        .product-result-area {
            margin-top: 12px;
            min-height: 28px;
            font-size: 1.02em;
        }
        .success {
            color: #23ad49;
            background: #e9fbe8;
            border-radius: 5px;
            padding-left: 4px;
        }
        .error {
            color: #db4b22;
            background: #ffefeb;
            border-radius: 5px;
            padding-left: 4px;
        }
        .product-inputs {
            margin-bottom: 5px;
            margin-top: 9px;
        }
        .product-inputs input {
            margin-bottom: 7px;
            width: 95%;
        }
        .divider {
            border-top: 1.5px solid #d9e1eb;
            margin: 32px 0 31px 0;
        }
        /* Print label button styling */
        .print-btn {
            margin-top: 8px;
            background: linear-gradient(95deg, #3472bc 65%, #79c1e2 120%);
            border-radius: 6px;
            color: #fff;
            padding: 7px 17px;
            font-size: 0.98em;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        .print-btn:hover {
            background: linear-gradient(90deg, #225c9a 70%, #55a2c6 110%);
        }
        /* Status chips */
        .status-chip {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: .96em;
            margin-top:4px;
        }
        .chip-held { background: #fff6d6; color: #c19719; }
        .chip-rejected { background: #ffe5e2; color: #d12e22; }
        .chip-incrate { background: #eafbf0; color: #05974c; }
        /* Mobile responsive */
        @media (max-width: 600px) {
            .main-container {
                border-radius: 0;
                box-shadow: none;
                padding: 14px 2vw 6vw 2vw;
                margin: 0;
                max-width: 100vw;
            }
            input, select, button {font-size:0.97em;}
        }
    </style>
</head>
<body>
<div class="main-container">

    <h2>Update Crate</h2>
    <div class="form-group">
        <div class="form-title">Crate Number</div>
        <input id="crate" placeholder="Crate Number">
    </div>
    <div class="form-group">
        <div class="form-title">Location</div>
        <input id="location" placeholder="Location">
    </div>
    <div class="form-group">
        <div class="form-title">Product Type</div>
        <select id="productType" onchange="resetProducts()">
            <option value="3 inserts">3 Inserts (Max 12)</option>
            <option value="4 inserts">4 Inserts (Max 9)</option>
        </select>
    </div>
    <h3>Products</h3>
    <div class="product-inputs" id="productContainer"></div>

    <button onclick="submitData()">Submit</button>
    <div class="status-area" id="message"></div>

    <div class="divider"></div>

    <h2>Find Crate</h2>
    <div class="form-group">
        <input id="search" placeholder="Crate Number">
        <button onclick="find()">Search</button>
    </div>
    <div class="result-area" id="result"></div>

    <div class="divider"></div>

    <h2>Find Product</h2>
    <div class="form-group">
        <input id="searchProduct" placeholder="Product Number">
        <button onclick="findProduct()">Search</button>
    </div>
    <div class="product-result-area" id="productResult"></div>

    <div class="divider"></div>

    <h3>Update Product Status</h3>
    <div class="form-group">
        <input id="statusProduct" placeholder="Product Number">
    </div>
    <div class="form-group">
        <select id="statusType">
            <option value="held">Held</option>
            <option value="rejected">Rejected</option>
        </select>
    </div>
    <button onclick="updateStatus()">Update Status</button>
    <div class="status-area" id="statusMessage"></div>
</div>

<script>
function getMaxCapacity() {
    const type = document.getElementById('productType').value;
    return type === "3 inserts" ? 12 : 9;
}

// Create input
function createInput(index) {
    const input = document.createElement('input');
    input.placeholder = "Product " + (index + 1);
    input.oninput = function() {
        handleInputChange();
    };
    return input;
}

// Reset product inputs
function resetProducts() {
    const container = document.getElementById('productContainer');
    container.innerHTML = "";
    container.appendChild(createInput(0));
}

// Auto-expand inputs
function handleInputChange() {
    const container = document.getElementById('productContainer');
    const inputs = container.getElementsByTagName('input');
    const max = getMaxCapacity();

    const lastInput = inputs[inputs.length - 1];

    if (lastInput.value.trim() !== "" && inputs.length < max) {
        container.appendChild(createInput(inputs.length));
    }

    if (inputs.length >= max && lastInput.value.trim() !== "") {
        document.getElementById('message').innerText = "Crate is full";
        document.getElementById('message').className = "error";
    } else {
        document.getElementById('message').innerText = "";
        document.getElementById('message').className = "";
    }
}

// Collect products
function getProducts() {
    const inputs = document.getElementById('productContainer').getElementsByTagName('input');
    let products = [];
    for (let i = 0; i < inputs.length; i++) {
        const val = inputs[i].value.trim();
        if (val) products.push(val);
    }
    return products;
}

// 🔥 MAIN SUBMIT FIX
function submitData() {
    const crate = document.getElementById('crate').value.trim();
    const location = document.getElementById('location').value.trim();
    const productType = document.getElementById('productType').value;
    const products = getProducts();

    const messageEl = document.getElementById('message');

    // Validation
    if (!crate || !location) {
        messageEl.innerText = "Please fill crate number and location";
        messageEl.className = "error";
        return;
    }

    if (products.length === 0) {
        messageEl.innerText = "Please add at least one product";
        messageEl.className = "error";
        return;
    }

    fetch('/add_or_update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            crate_number: crate,
            location: location,
            product_type: productType,
            products: products
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            messageEl.innerText = data.error;
            messageEl.className = "error";
        } else {
            messageEl.innerText = "✅ Crate saved successfully!";
            messageEl.className = "success";
            document.getElementById('crate').value = "";
            document.getElementById('location').value = "";
            document.getElementById('productType').value = "3 inserts";
            resetProducts();
        }
    })
    .catch(() => {
        messageEl.innerText = "Server error. Check backend.";
        messageEl.className = "error";
    });
}

// Find crate
function find() {
    const crate = document.getElementById('search').value.trim();

    fetch('/get_crate/' + crate)
    .then(res => {
        if (res.headers.get('content-type').includes('application/json')) {
            return res.json();
        } else {
            return { error: "Invalid response from backend." }
        }
    })
    .then(data => {
        const resultEl = document.getElementById('result');

        if (data.error) {
            resultEl.innerHTML = `<div class="error">${data.error === "Not found" ? "Crate not found." : data.error}</div>`;
        } else {
            resultEl.innerHTML = `
                <div style="line-height:1.7">
                    <b>Products:</b> ${data.products?.join(', ') || "-"}<br>
                    <b>Location:</b> ${data.location || "-"}<br>
                    <b>Type:</b> ${data.product_type || "-"}<br><br>
                    <button class="print-btn" onclick="printLabel('${data.crate_number}')">
                        🖨️ Print Label
                    </button>
                </div>
            `;
        }
    });
}

// Find product
function findProduct() {
    const product = document.getElementById('searchProduct').value.trim();

    fetch('/find_by_product/' + product)
    .then(res => res.json())
    .then(data => {
        const resultEl = document.getElementById('productResult');

        if (data.error) {
            resultEl.innerHTML = `<div class="error">Product not found</div>`;
        } else {
            let html = "<b>Result:</b><br><br>";
            data.results.forEach(r => {
                if (r.status === "in_crate") {
                    html += `
                        <div style="margin-bottom:10px;">
                            <span class="status-chip chip-incrate">✅ In Crate: ${r.crate_number}</span> <br>
                            <span style="color:#23506e;">📍 Location: ${r.location}</span> <br>
                            <button class="print-btn" onclick="printLabel('${r.crate_number}')">
                                🖨️ Print Label
                            </button>
                        </div>
                    `;
                } else if (r.status === "held") {
                    html += `<div class="status-chip chip-held">🟡 Product is HELD</div>`;
                } else if (r.status === "rejected") {
                    html += `<div class="status-chip chip-rejected">🔴 Product is REJECTED</div>`;
                }
            });
            resultEl.innerHTML = html;
        }
    });
}

function updateStatus() {
    fetch('/add_product_status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            product_number: document.getElementById('statusProduct').value,
            status: document.getElementById('statusType').value
        })
    })
    .then(res => res.json())
    .then(data => {
        const msg = data.message || data.error;
        document.getElementById('statusMessage').innerText = msg;
        document.getElementById('statusMessage').className = msg && data.message ? "success" : "error";
    });
}

function printLabel(crateNumber) {
    if (!crateNumber) {
        alert("Invalid crate number");
        return;
    }
    window.open("/generate_label/" + crateNumber, "_blank");
}

// Init
resetProducts();
</script>

</body>
</html>
