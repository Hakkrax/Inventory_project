<!DOCTYPE html>
<html>
<head>
    <title>Crate Details</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 15px;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .info {
            margin-bottom: 10px;
        }

        .info strong {
            display: inline-block;
            width: 130px;
        }

        .products {
            margin-top: 15px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .product-item {
            background: #eaeaea;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: gray;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="title">
        Crate: {{ crate.crate_number }}
    </div>

    <div class="info">
        <strong>Location:</strong> {{ crate.location }}
    </div>

    <div class="info">
        <strong>Type:</strong> {{ crate.product_type }}
    </div>

    <div class="info">
        <strong>Total:</strong> {{ products|length }}
    </div>

    <div class="products">
        <strong>Products:</strong>

        <div class="product-grid">
            {% for p in products %}
                <div class="product-item">{{ p }}</div>
            {% endfor %}
        </div>
    </div>

    <div class="footer">
        Last updated: {{ crate.last_updated.strftime('%Y-%m-%d %H:%M') }}
    </div>

</div>

</body>
</html>
